services:
  - type: web
    name: studybud
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn studybud.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: studybud-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: studybud-db
    plan: free
